<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borkata's Site</title>
    <style>
        body {
            background: linear-gradient(
                120deg,
                #0b0014,
                #1a0033,
                #2b0055,
                #1a0033,
                #0b0014
            );
            background-size: 400% 400%;
            animation: bgMove 14s ease infinite;

            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        @keyframes bgMove {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Hello, I am Borkata. This will be my site for the next year.</h1>
</body>
</html>
