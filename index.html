<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Navigation Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Full black background */
        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            text-align: center;
        }

        /* Download button */
        .btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            background-color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 40px;
        }

        .btn:hover {
            background-color: #ddd;
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Minecraft IP section */
        .ip-section {
            background-color: #111;
            padding: 25px 40px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .ip-title {
            font-size: 20px;
            margin-bottom: 15px;
        }

        .ip-address {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00ff99;
        }

        .copy-btn {
            padding: 8px 20px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #fff;
            color: #000;
            transition: 0.3s;
        }

        .copy-btn:hover {
            background-color: #ccc;
        }

        .copied-text {
            margin-top: 10px;
            font-size: 14px;
            color: #00ff99;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Downloads Button -->
        <button class="btn" onclick="goToDownloads()">Downloads</button>

        <!-- Minecraft IP Section -->
        <div class="ip-section">
            <div class="ip-title">Minecraft Server IP</div>
            <div class="ip-address" id="serverIP">site-whereas.gl.joinmc.link</div>
            <button class="copy-btn" onclick="copyIP()">Copy IP</button>
            <div class="copied-text" id="copiedText">Copied to clipboard ✔️</div>
        </div>

    </div>

    <script>
        function goToDownloads() {
            window.location.href = "/downloads/downloads.html";
        }

        function copyIP() {
            const ip = document.getElementById("serverIP").innerText;
            navigator.clipboard.writeText(ip).then(() => {
                const copiedText = document.getElementById("copiedText");
                copiedText.style.display = "block";
                
                setTimeout(() => {
                    copiedText.style.display = "none";
                }, 2000);
            });
        }
    </script>

</body>
</html>
