<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borkata's Site</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: absolute;
            top: 20px;
            left: 20px;
        }
        button {
            background-color: transparent;
            color: white;
            border: 2px solid white;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }
        button:hover {
            background-color: white;
            color: black;
        }
        .download-section {
            margin-top: 40px;
            text-align: center;
        }
        .downloads-subsection {
            display: none;
            margin-top: 20px;
        }
        .downloads-subsection button {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Top-left buttons -->
    <div class="button-container">
        <a href="about/about.html">
            <button>About</button>
        </a>
        <button id="downloads-button">Downloads</button>
        <button>Button 3</button>
    </div>

    <!-- Download Section Subsection -->
    <div class="downloads-subsection" id="downloads-section">
        <h3>Additional Downloads</h3>
        <a href="path/to/your/file1.zip" download>
            <button>Download File 1</button>
        </a>
        <a href="path/to/your/file2.zip" download>
            <button>Download File 2</button>
        </a>
    </div>

    <script>
        // Toggle the downloads section visibility when "Downloads" button is clicked
        document.getElementById('downloads-button').addEventListener('click', function() {
            const downloadsSection = document.getElementById('downloads-section');
            downloadsSection.style.display = downloadsSection.style.display === 'none' || !downloadsSection.style.display ? 'block' : 'none';
        });
    </script>
</body>
</html>
