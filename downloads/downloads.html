<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Redirect</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background-color: #000;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.redirect-btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 18px 45px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.redirect-btn:hover {
    background: #ddd;
    transform: scale(1.08);
}

.redirect-btn:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<button class="redirect-btn" onclick="redirectToSite()">
    Go To Download
</button>

<script>
function redirectToSite() {
    window.location.href = "https://example.com";
}
</script>

</body>
</html>
