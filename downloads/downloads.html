<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloads Layout</title>

<style>
body {
    background: linear-gradient(
        120deg,
        #0b0014,
        #1a0033,
        #2b0055,
        #1a0033,
        #0b0014
    );
    background-size: 400% 400%;
    animation: bgMove 14s ease infinite;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 30px;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* button rows */
.row {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

.row button {
    background: #222;
    color: white;
    border: 2px solid #555;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 6px;
}

.row button:hover {
    background: #555;
}

/* big panels */
.panel {
    background: #333;
    padding: 25px;
    border-radius: 8px;
    margin-bottom: 30px;
    max-width: 700px;
    box-shadow: 0 0 15px rgba(0,0,0,0.7);
}

.panel h3 {
    margin-top: 0;
}

.panel button {
    margin-top: 15px;
    background: #444;
    border: none;
    color: white;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 5px;
}

.panel button:hover {
    background: #666;
}
</style>
</head>
